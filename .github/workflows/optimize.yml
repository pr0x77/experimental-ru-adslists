name: List Optimizer & Apple Updater
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Запуск каждый понедельник в полночь
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Official Apple Domains
        run: |
          # Вытягиваем домены со страницы Apple
          curl -s https://support.apple.com/en-us/HT210060 | grep -oE "([a-z0-9-]+\.)+(apple\.com|icloud\.com|apple-dns\.net|mzstatic\.com)" | sort -u > apple_official.txt
          # Добавляем префикс DOMAIN-SUFFIX и объединяем с твоим файлом
          sed -i 's/^/DOMAIN-SUFFIX,/' apple_official.txt
          cat apple_official.txt rules/apple-all.txt | sort -u > temp.txt
          mv temp.txt rules/apple-all.txt
          rm apple_official.txt

      - name: Clean and Sort RU Ads
        run: |
          if [ -f rules/ru-ads.txt ]; then
            sort -u rules/ru-ads.txt -o rules/ru-ads.txt
          fi

      - name: Auto Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 System: Списки оптимизированы и домены Apple обновлены"
