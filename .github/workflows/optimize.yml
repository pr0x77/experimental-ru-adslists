name: List Optimizer
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean and Sort
        run: |
          # Чистим рекламу
          if [ -f rules/ru-ads.txt ]; then
            sort -u rules/ru-ads.txt -o rules/ru-ads.txt
          fi
          # Чистим Apple
          if [ -f rules/apple-all.txt ]; then
            sort -u rules/apple-all.txt -o rules/apple-all.txt
          fi
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 System: Оптимизация списков"
