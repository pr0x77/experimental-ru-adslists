name: List Optimizer & RU-Apple Updater
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write # Даем роботу право записывать файлы в репозиторий

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- БЛОК APPLE ---
      - name: Fetch Official Apple Domains
        run: |
          curl -s https://support.apple.com/en-us/HT210060 | grep -oE "([a-z0-9-]+\.)+(apple\.com|icloud\.com|apple-dns\.net|mzstatic\.com)" | sort -u > apple_official.txt
          sed -i 's/^/DOMAIN-SUFFIX,/' apple_official.txt
          cat apple_official.txt rules/apple-all.txt | sort -u > temp_apple.txt
          mv temp_apple.txt rules/apple-all.txt
          rm apple_official.txt

      # --- БЛОК RU ADS ---
      - name: Clean and Sort RU Ads
        run: |
          if [ -f rules/ru-ads.txt ]; then
            # Убираем всё после / и $
            sed -i 's/\/.*//g' rules/ru-ads.txt
            sed -i 's/\$.*//g' rules/ru-ads.txt
            # Чистим дубли и пустые строки
            sort -u rules/ru-ads.txt -o rules/ru-ads.txt
            grep -v '^[[:space:]]*$' rules/ru-ads.txt > temp_ru.txt && mv temp_ru.txt rules/ru-ads.txt
          fi

      # --- ФИНАЛЬНЫЙ КОММИТ ---
      - name: Auto Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 System: Списки оптимизированы и домены Apple обновлены"
          push_options: '--force'
