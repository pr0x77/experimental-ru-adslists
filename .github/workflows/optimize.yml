name: Optimize Blocklist
on:
  push:
    paths:
      - 'wildcard/onlydomains.txt'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean and Sort List
        run: |
          # Убираем комментарии, пустые строки, пробелы, удаляем дубликаты и сортируем
          sed -i '/^#/d; /^[[:space:]]*$/d; s/[[:space:]]//g' wildcard/onlydomains.txt
          sort -u wildcard/onlydomains.txt -o wildcard/onlydomains.txt
          
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-optimize blocklist: remove duplicates and sort"
